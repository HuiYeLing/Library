# 配置 WEB 服务器端口
server.port=8080

# 数据源配置
spring.application.name=library
# MySQL数据库连接URL，禁用SSL，设置时区为UTC，字符编码为utf8
spring.datasource.url=jdbc:mysql://localhost:3306/library?useSSL=false&serverTimezone=UTC&characterEncoding=utf8&allowPublicKeyRetrieval=true
# MySQL驱动类名
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
# 数据库用户名
spring.datasource.username=root
# 数据库密码
spring.datasource.password=123456

# 连接池配置
# 最小空闲连接数
spring.datasource.hikari.minimum-idle=5
# 最大连接池大小
spring.datasource.hikari.maximum-pool-size=15
# 自动提交事务
spring.datasource.hikari.auto-commit=true
# 空闲连接超时时间（毫秒）
spring.datasource.hikari.idle-timeout=30000
# 连接池名称
spring.datasource.hikari.pool-name=LibraryHikariCP
# 连接最大生存时间（毫秒）
spring.datasource.hikari.max-lifetime=1800000
# 连接超时时间（毫秒）
spring.datasource.hikari.connection-timeout=30000

# JPA配置
# 数据库方言，指定为MySQL8
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
# Hibernate DDL自动更新策略
spring.jpa.hibernate.ddl-auto=update
# 显示SQL语句
spring.jpa.show-sql=true
# 格式化SQL输出
spring.jpa.properties.hibernate.format_sql=true

# 编码配置
# HTTP请求响应字符编码
spring.http.encoding.charset=UTF-8
# 启用编码配置
spring.http.encoding.enabled=true
# 强制使用指定编码
spring.http.encoding.force=true

# 日志配置
# 根日志级别
logging.level.root=INFO
# Spring Web日志级别
logging.level.org.springframework.web=INFO
# Hibernate SQL日志级别
logging.level.org.hibernate.SQL=DEBUG
# Hibernate参数绑定日志级别
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
# 项目包日志级别
logging.level.com.library=DEBUG

# 文件上传配置
# 启用多部分文件上传
spring.servlet.multipart.enabled=true
# 单个文件最大大小
spring.servlet.multipart.max-file-size=10MB
# 整个请求最大大小
spring.servlet.multipart.max-request-size=100MB

# 静态资源配置
# 静态资源访问路径模式
spring.mvc.static-path-pattern=/static/**
# 静态资源存放位置（已废弃，建议使用下面的配置）
spring.resources.static-locations=classpath:/static/

# Spring MVC配置
# 日期格式化模式
spring.mvc.date-format=yyyy-MM-dd HH:mm:ss
# Jackson日期格式化
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss
# 时区设置
spring.jackson.time-zone=GMT+8

# Tomcat服务器配置
# URI编码
server.tomcat.uri-encoding=UTF-8
# 最大工作线程数
server.tomcat.max-threads=200
# 最大连接数
server.tomcat.max-connections=8192

# 静态资源位置配置（包含类路径和文件系统路径）
spring.web.resources.static-locations=classpath:/static/,file:uploads/

# 禁用Spring Security自动配置
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration

# 文件上传保存路径
uploadPath=D:/study/Tii/program/library/uploads